<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OperantX</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="OperantX — Deploy. Deny. Exfil.">
  <meta name="keywords" content="OperantX, OX, Operant, Operants, Deploy, Deny, Exfil">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="OperantX">
  <meta property="og:description" content="OperantX — Deploy. Deny. Exfil.">
  <meta property="og:image" content="https://operantx.com/logo.jpg">
  <meta property="og:url" content="https://operantx.com">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Aldrich&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: "Aldrich", sans-serif;
      background: #efefef;
      user-select: none;
    }
    #header {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      line-height: 1;
    }
    #header>h1 {
      color: #0a0a0a;
      margin: 0;
      font-size: 3rem;
      letter-spacing: -0.05em;
      padding: 0 12px 0 9px;
      border-top: 5px solid #000;
      border-bottom: 5px solid #000;
      border-right: 5px solid #000;
      border-left: none;
      box-sizing: border-box;
      height: 80px;
      display: flex;
      align-items: center;
    }
    #header>h1>span {
      display: inline-block;
      transform: translateY(2px);
    }
    #header>img {
      max-width: 100%;
      height: 80px;
      display: block;
      margin-right: -2px;
    }
    h2 {
      margin-top: 0px;
    }
    #login {
      font-family: "Aldrich", sans-serif;
      background-color: black;
      color: white;
      font-size: 1.2rem;
      padding: 6px 8px 4px 8px;
      margin-bottom: 100px;
    }
    #social-note {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font-family: "Aldrich", sans-serif;
      color: #333;
      font-size: 0.95rem;
      opacity: 0.75;
    }
    #terminal-link {
      position: fixed;
      right: 12px;
      bottom: 12px;
      font-size: 1.5rem;
      text-decoration: none;
      color: #333;
      opacity: 0.85;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    #terminal-link:hover {
      opacity: 1;
      transform: translateY(-1px);
    }
    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      51%, 100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="header">
    <img src="logo.jpg" alt="Logo">
    <h1><span>OperantX</span></h1>
  </div>
  <h2>Deploy. Deny. Exfil.</h2>
  <div id="social-note">No social media.</div>
  <a id="terminal-link" href="https://terminal.operantx.com" target="_blank" rel="noopener noreferrer">🖥️</a>
</body>
</html>
